version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "daily"
      time: "09:00"
      timezone: "America/Argentina/Buenos_Aires"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "security"
    groups:
      gradle-dependencies:
        patterns:
          - "*"
    # CodeQL's Java extractor does not support Kotlin 2.4.x yet, so these
    # updates break the CodeQL workflow (see PR #36: "Kotlin version 2.4.10
    # is too recent"). Drop this ignore once CodeQL adds support.
    ignore:
      - dependency-name: "org.jetbrains.kotlin.jvm"
        versions: ["2.4.x"]
      - dependency-name: "org.jetbrains.kotlin:kotlin-stdlib"
        versions: ["2.4.x"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "09:00"
      timezone: "America/Argentina/Buenos_Aires"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    groups:
      github-actions:
        patterns:
          - "*"
