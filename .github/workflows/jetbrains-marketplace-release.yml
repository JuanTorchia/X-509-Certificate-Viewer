name: JetBrains Marketplace Release

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: jetbrains-marketplace-release
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to JetBrains Marketplace
    runs-on: ubuntu-latest
    environment: jetbrains-marketplace
    steps:
      - name: Validate release tag
        shell: bash
        run: |
          tag="${{ github.event.release.tag_name }}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must match vX.Y.Z or vX.Y.Z-suffix. Got: $tag" >&2
            exit 1
          fi
          echo "PLUGIN_VERSION=${tag#v}" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=$tag" >> "$GITHUB_ENV"

      - name: Fetch Sources
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Validate release candidate
        run: |
          chmod +x gradlew
          xvfb-run --auto-servernum ./gradlew validateFunctional verifyPlugin --no-daemon --stacktrace -PpluginVersion=$PLUGIN_VERSION

      - name: Publish plugin
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
        run: |
          ./gradlew publishPlugin --no-daemon --stacktrace -PpluginVersion=$PLUGIN_VERSION

      - name: Attach plugin ZIP to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$RELEASE_TAG" build/distributions/*.zip --clobber
