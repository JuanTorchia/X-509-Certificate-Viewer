name: Bug report
description: Report a reproducible problem in the certificate viewer.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      options:
        - IntelliJ plugin
        - CI / publishing
        - Documentation
    validations:
      required: true
  - type: input
    id: format
    attributes:
      label: Certificate or keystore format
      placeholder: "PEM, DER, PKCS#12, JKS, JCEKS, etc."
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Use sanitized or generated fixtures only.
      placeholder: |
        1. Open ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: "IDE version, OS, Java version, plugin version"
