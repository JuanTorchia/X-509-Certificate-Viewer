name: Feature request
description: Propose a scoped improvement.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: dropdown
    id: surface
    attributes:
      label: Target surface
      options:
        - IntelliJ plugin
        - Parser core
        - CI / release
        - Documentation
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or maintainer problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: validation
    attributes:
      label: Validation approach
      placeholder: "Tests, fixtures, screenshots, or manual checks"
